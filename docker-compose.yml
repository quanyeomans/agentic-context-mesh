# Kairix — Docker Compose stack
#
# Get started:
#   1. cp .env.example .env && edit .env (add your LLM API key)
#   2. ln -s /path/to/your/documents ./vault
#   3. docker compose up -d
#   4. docker compose exec kairix kairix setup
#   5. docker compose exec kairix kairix search "your question"
#
# Services:
#   kairix        — MCP server (port 8080) for agent integration + CLI
#   kairix-worker — background tasks (hourly embed, nightly entity seed)
#   neo4j         — knowledge graph for people/company/relationship queries

services:
  kairix:
    build: .
    # Or use pre-built image:
    # image: ghcr.io/quanyeomans/kairix:latest
    ports:
      - "8080:8080"
    volumes:
      - ./vault:/data/vault:ro
      - kairix-data:/data/kairix
      - ./kairix.config.yaml:/opt/kairix/kairix.config.yaml:ro
    env_file:
      - .env
    environment:
      - KAIRIX_NEO4J_URI=bolt://neo4j:7687
      - KAIRIX_NEO4J_USER=neo4j
      - KAIRIX_NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kairix", "onboard", "check"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s

  kairix-worker:
    build: .
    command: ["worker"]
    volumes:
      - ./vault:/data/vault:ro
      - kairix-data:/data/kairix
      - ./kairix.config.yaml:/opt/kairix/kairix.config.yaml:ro
    env_file:
      - .env
    environment:
      - KAIRIX_NEO4J_URI=bolt://neo4j:7687
      - KAIRIX_NEO4J_USER=neo4j
      - KAIRIX_NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-changeme} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # Uncomment to expose Neo4j browser (http://localhost:7474):
    # ports:
    #   - "7474:7474"
    #   - "7687:7687"

volumes:
  kairix-data:
  neo4j-data:
