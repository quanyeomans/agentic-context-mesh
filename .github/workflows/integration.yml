name: Integration (PR to main)

# Runs full integration suite on PRs targeting main.
# Separated from ci.yml so it can use larger runners when needed.
# Engineering hub: "Integration tests: medium (30s–2min). Stop on >3 failures."

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]

jobs:
  # Require PR description to include benchmark comparison if retrieval logic changed
  pr-gates:
    name: PR compliance check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6

      - name: Check PR description completeness
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const title = pr.title || '';

            const retrieval_files = [
              'mnemosyne/search/',
              'mnemosyne/temporal/',
              'mnemosyne/embed/',
              'mnemosyne/entities/'
            ];

            // Check if PR touches retrieval logic
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            const touches_retrieval = files.data.some(f =>
              retrieval_files.some(path => f.filename.startsWith(path))
            );

            if (touches_retrieval && !body.includes('benchmark')) {
              core.warning(
                'This PR modifies retrieval logic but the description does not mention benchmark results. ' +
                'Engineering hub requires: "PRs that change retrieval logic must include benchmark result comparison." ' +
                'Please add before/after benchmark scores to the PR description.'
              );
              // Warning only — not a hard failure. Builder to verify.
            }

            // Check no secrets in title or description (basic)
            const secret_patterns = [/sk-[a-zA-Z0-9]{20,}/, /[a-f0-9]{32,}/];
            for (const pattern of secret_patterns) {
              if (pattern.test(title) || pattern.test(body)) {
                core.setFailed('Potential secret detected in PR title or description.');
              }
            }

            console.log(`Retrieval logic touched: ${touches_retrieval}`);
            console.log('PR gates passed.');

  # Full integration test suite against live sqlite-vec
  full-integration:
    name: Full integration suite
    runs-on: ubuntu-latest
    needs: pr-gates

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev]" pytest-timeout

      - name: Install QMD to get sqlite-vec
        run: |
          npm install -g qmd 2>/dev/null || \
          npx --yes qmd --version 2>/dev/null || \
          echo "QMD not available — integration tests requiring sqlite-vec will skip"
        continue-on-error: true

      - name: Run integration tests
        run: |
          pytest tests/ \
            -m "integration or contract" \
            -v --tb=short \
            --maxfail=3 \
            --timeout=60
        env:
          MNEMOSYNE_TEST_DB: /tmp/mnemosyne-ci-${{ github.run_id }}.sqlite

      - name: Verify backwards compat shim
        run: |
          python -c "
          # Verify all public symbols are accessible from both old and new paths
          from mnemosyne.embed.embed import (
              encode_vector, build_hash_seq, batched, chunk_text,
              stage_embedding, flush_staging_to_vec, ensure_staging_table, run_embed
          )
          from mnemosyne.embed.schema import (
              validate_schema, ensure_vec_table, load_sqlite_vec, find_sqlite_vec, get_qmd_db_path
          )
          from mnemosyne.embed.recall_check import run_recall_gate
          from qmd_azure_embed.embed import encode_vector as ev2, build_hash_seq as bhs2
          assert encode_vector is ev2, 'shim broken: encode_vector'
          assert build_hash_seq is bhs2, 'shim broken: build_hash_seq'
          print('All backwards compat checks passed.')
          "
