# Benchmark suite for Builder agent — Phase 1 fixed set
# Canonical 39-query suite used for Phase 1 evaluation (2026-03-22)
# Migrated from run-benchmark-hybrid.py to YAML format (issue #13)

meta:
  name: "builder-phase1"
  version: "1.1"
  agent: "builder"
  collections: [vault, knowledge-builder, knowledge-shared, tc-engineering, tc-agent-zone]
