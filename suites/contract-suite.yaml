meta:
  name: contract
  description: >
    CI contract suite — runs against the mock retrieval backend (no Azure required).
    Tests pipeline code correctness (RRF fusion, scoring, boost logic) not retrieval quality.
    Baseline committed to benchmark-results/contract-baseline.json.
    Gate: overall weighted_total must not regress more than 0.02 from the baseline.
  version: "1.0"
  system: mock
  n_cases: 20

cases:
  # --- recall (weight 0.25) ---
  - id: CON-R001
    category: recall
    query: hybrid search retrieval architecture bm25 vector
    score_method: ndcg
    gold_titles:
      - title: retrieval-architecture
        relevance: 2
      - title: rrf-fusion
        relevance: 1
      - title: bm25-scoring
        relevance: 1

