meta:
  name: reflib-contract
  description: >
    CI contract suite for the reference library mock backend. Tests pipeline
    code correctness against the mock-reflib fixture corpus (30 documents
    spanning 12 reference library collections). No Azure required.
  version: "1.0"
  system: mock-reflib
  n_cases: 20

cases:
  # --- recall (8) ---
  - id: RL-R001
    category: recall
    query: agent loop pattern observe orient decide act react
    score_method: ndcg
    gold_titles:
      - title: agent-loop-patterns
        relevance: 2
      - title: tool-use-protocols
        relevance: 1

