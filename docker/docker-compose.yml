version: "3.9"

volumes:
  secrets-volume:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  neo4j-data:

services:
  vault-agent:
    build: ./vault-agent
    environment:
      - KAIRIX_KV_NAME=${KAIRIX_KV_NAME}
    volumes:
      - secrets-volume:/run/secrets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/run/secrets/kairix.env"]
      interval: 10s
      timeout: 5s
      retries: 6

  kairix:
    image: kairix:latest
    volumes:
      - secrets-volume:/run/secrets:ro
    environment:
      - KAIRIX_SECRETS_DIR=/run/secrets
      - KAIRIX_KV_NAME=${KAIRIX_KV_NAME}
      - KAIRIX_VAULT_ROOT=${KAIRIX_VAULT_ROOT:-/data/vault}
      - KAIRIX_NEO4J_URI=bolt://neo4j:7687
    depends_on:
      vault-agent:
        condition: service_healthy
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    volumes:
      - secrets-volume:/run/secrets:ro
      - neo4j-data:/data
    entrypoint: ["/bin/bash", "-c",
      "source /run/secrets/kairix.env && export NEO4J_AUTH=neo4j/$KAIRIX_NEO4J_PASSWORD && exec neo4j console"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
